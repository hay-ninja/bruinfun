<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BruinFun — Browse Activities</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      width: 63px;
      background: #ebebeb;
      border-radius: 30px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 3px 4px 15px rgba(0, 0, 0, 0.10);
      z-index: 10;
    }

    .nav-item {
      height: 51px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #a7a7a7;
      transition: background 0.15s;
    }

    .nav-item.active {
      background: #3973dc;
      color: #fff;
    }

    .nav-item svg { display: block; }

    .nav-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    /* ── Main ── */
    .main {
      margin-left: 128px;
      padding: 62px 48px 80px;
      flex: 1;
      max-width: 1160px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.36px;
      color: #000;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(120, 120, 120, 0.10);
      border-radius: 999px;
      padding: 10px 18px;
      width: 224px;
      color: #949494;
      font-size: 16px;
      cursor: text;
    }

    /* ── Category tabs ── */
    .tabs-wrap {
      margin-bottom: 12px;
    }

    .tabs {
      display: flex;
      gap: 52px;
      align-items: center;
      padding-left: 10px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.72px;
    }

    .tab {
      cursor: pointer;
      padding-bottom: 10px;
      color: #000;
      opacity: 0.4;
      position: relative;
    }

    .tab.active {
      opacity: 1;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #000;
      border-radius: 2px;
    }

    .tab-divider {
      height: 1px;
      background: #e0e0e0;
    }

    /* ── Filter pills ── */
    .filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin: 12px 0 24px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8.6px 17.2px 8.6px 14.3px;
      border-radius: 999px;
      font-size: 14.3px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      background: #ebebeb;
      color: #323232;
      border: none;
    }

    .pill.active {
      background: #000;
      color: #fff;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.72px;
      color: #000;
      margin-bottom: 8px;
    }

    .card-row-wrap {
      position: relative;
      overflow: hidden;
    }

    .card-row-wrap::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      width: 83px;
      height: 100%;
      background: linear-gradient(to right, rgba(250,250,250,0) 0%, rgba(250,250,250,0.8) 50%, #fafafa 100%);
      pointer-events: none;
    }

    .card-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
    }

    .card-row::-webkit-scrollbar { display: none; }

    /* ── Activity card ── */
    .card {
      flex-shrink: 0;
      width: 310px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 0 16px;
      border-radius: 28px;
      overflow: hidden;
    }

    .card-img-wrap {
      position: relative;
      height: 252px;
      border-radius: 20px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-img-wrap img.card-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bookmark {
      position: absolute;
      top: 12px;
      right: 13px;
      width: 34px;
      height: 34px;
    }

    .bookmark img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .card-info {
      padding: 0 4px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.8px;
      color: #000;
    }

    .card-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #f0ac19;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.8px;
      white-space: nowrap;
    }

    .card-rating .star {
      font-size: 15px;
    }

    .card-desc {
      font-size: 14px;
      color: #ababab;
      letter-spacing: -0.56px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 213px;
    }
  </style>
</head>
<body>

  <!-- Sidebar nav -->
  <nav class="sidebar">
    <div class="nav-item active" title="Feed">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="1" y="12" width="5" height="9" rx="1.5" fill="currentColor"/>
        <rect x="8.5" y="7" width="5" height="14" rx="1.5" fill="currentColor"/>
        <rect x="16" y="2" width="5" height="19" rx="1.5" fill="currentColor"/>
      </svg>
    </div>
    <div class="nav-item" title="Map">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M8 2L2 5v14l6-3 6 3 6-3V2l-6 3-6-3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M8 2v14M14 5v14" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="nav-item" title="Profile">
      <img class="nav-avatar" src="https://www.figma.com/api/mcp/asset/14d6abee-f002-49ec-8260-6d770c28a6e5" alt="Profile" />
    </div>
  </nav>

  <!-- Main content -->
  <main class="main">

    <!-- Header -->
    <div class="header">
      <h1 class="page-title">Browse Activities</h1>
      <div class="search-bar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="7" cy="7" r="5" stroke="#949494" stroke-width="1.5"/>
          <path d="M10.5 10.5L13.5 13.5" stroke="#949494" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Search</span>
      </div>
    </div>

    <!-- Category tabs -->
    <div class="tabs-wrap">
      <div class="tabs">
        <span class="tab active">Accessories</span>
        <span class="tab">Tops</span>
        <span class="tab">Shoes</span>
        <span class="tab">Something</span>
        <span class="tab">New</span>
      </div>
      <div class="tab-divider"></div>
    </div>

    <!-- Filter pills -->
    <div class="filters">
      <button class="pill active">All Activities</button>
      <button class="pill">
        <span style="color:#ff2c55;">🛍</span> Product
      </button>
      <button class="pill">
        <span style="color:#ff9502;">🍴</span> Restaurant
      </button>
      <button class="pill">
        <span style="color:#007aff;">📍</span> Place
      </button>
      <button class="pill">
        <span style="color:#4bb430;">✦</span> Service
      </button>
      <button class="pill">
        <span style="color:#af3ccc;">🎫</span> Event
      </button>
    </div>

    <!-- Sections rendered by JS -->
    <div id="sections"></div>

  </main>

  <script>
    const CARD_IMG    = 'https://www.figma.com/api/mcp/asset/e0bd84c2-0c87-489e-935c-95d8222dd386';
    const BOOKMARK    = 'https://www.figma.com/api/mcp/asset/d3b3aec3-b035-450a-b31d-ef729f76f939';

    const sections = [
      {
        title: 'Accessories',
        cards: [
          { title: 'Sunset Rec Lounging',  rating: '4.6', desc: 'Short Description here descriping something or other' },
          { title: 'Sunset Rec Lounging',  rating: '4.6', desc: 'Short Description here descriping something or other' },
          { title: 'Sunset Rec Lounging',  rating: '4.6', desc: 'Short Description here descriping something or other' },
          { title: 'Sunset Rec Lounging',  rating: '4.6', desc: 'Short Description here descriping something or other' },
          { title: 'Sunset Rec Lounging',  rating: '4.6', desc: 'Short Description here descriping something or other' },
        ]
      },
      {
        title: 'Accessories',
        cards: [
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
        ]
      },
      {
        title: 'Accessories',
        cards: [
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
          { title: 'Ocean Breeze Hat', rating: '4.8', desc: 'Stylish sun protection for your beach days' },
        ]
      },
    ];

    function renderCard({ title, rating, desc }) {
      return `
        <div class="card">
          <div class="card-img-wrap">
            <img class="card-photo" src="${CARD_IMG}" alt="${title}" />
            <div class="bookmark">
              <img src="${BOOKMARK}" alt="Save" />
            </div>
          </div>
          <div class="card-info">
            <div class="card-meta">
              <span class="card-title">${title}</span>
              <div class="card-rating">
                <span>${rating}</span>
                <span class="star">★</span>
              </div>
            </div>
            <div class="card-desc">${desc}</div>
          </div>
        </div>`;
    }

    document.getElementById('sections').innerHTML = sections.map(({ title, cards }) => `
      <div class="section">
        <div class="section-title">${title}</div>
        <div class="card-row-wrap">
          <div class="card-row">${cards.map(renderCard).join('')}</div>
        </div>
      </div>
    `).join('');

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });

    // Pill switching
    document.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
      });
    });
  </script>

</body>
</html>
